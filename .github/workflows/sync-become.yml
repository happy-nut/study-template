name: Sync Become engine

on:
  workflow_dispatch:
  schedule:
    - cron: "17 21 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.repository != 'happy-nut/become'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download the latest sync tool
        run: |
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/happy-nut/become/master/scripts/sync-become.sh \
            --output /tmp/sync-become.sh
          chmod +x /tmp/sync-become.sh

      - name: Sync engine-owned files
        run: /tmp/sync-become.sh

      - name: Open or update sync pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "Already up to date."
            exit 0
          fi

          branch="chore/sync-become"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add AGENTS.md CLAUDE.md GEMINI.md .claude .become scripts .github/workflows/sync-become.yml
          git commit -m "chore: sync Become engine"
          git push --force-with-lease origin "$branch"

          if gh pr view "$branch" >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --title "chore: sync Become engine" \
              --body "Updates engine-owned files from happy-nut/become. Learner-owned PROFILE.md and box*/ data are untouched."
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$branch" \
              --title "chore: sync Become engine" \
              --body "Updates engine-owned files from happy-nut/become. Learner-owned PROFILE.md and box*/ data are untouched."
          fi
